  - name: "process"
    label: "⚙️ Process"
    files:
      - name: "page"
        label: "Process Page Images"
        file: "content/process/page.json"
        fields:
          - { name: "ctaImage", label: "CTA Section Photo", widget: "image", required: false, hint: "Landscape or portrait photo. Recommended: 1000×700px, JPG under 1MB." }
      - name: "step1"
        label: "Step 1 — Discover"
        file: "content/process/step1.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "text", label: "Description", widget: "text" }
      - name: "step2"
        label: "Step 2 — Plan"
        file: "content/process/step2.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "text", label: "Description", widget: "text" }
      - name: "step3"
        label: "Step 3 — Film / Edit"
        file: "content/process/step3.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "text", label: "Description", widget: "text" }
      - name: "step4"
        label: "Step 4 — Deliver"
        file: "content/process/step4.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "text", label: "Description", widget: "text" }

  - name: "about"
    label: "👤 About"
    files:
      - name: "hero"
        label: "Hero — Banner Section"
        file: "content/about/hero.json"
        fields:
          - { name: "heroImage", label: "Background Photo", widget: "image", required: false, hint: "Landscape photo. Recommended: 1400×900px or wider, JPG under 1.5MB." }
          - { name: "heroHeading", label: "Heading", widget: "text" }
          - { name: "heroSubheading", label: "Subheading", widget: "text" }

      - name: "philosophy"
        label: "Creative Philosophy — Body Section"
        file: "content/about/philosophy.json"
        fields:
          - { name: "philosophyTitle", label: "Section Title", widget: "text" }
          - { name: "philosophyText", label: "Section Body", widget: "text" }
          - { name: "pullQuote", label: "Pull Quote", widget: "text" }
          - { name: "col1Text", label: "Body Column 1", widget: "text" }
          - { name: "col2Text", label: "Body Column 2", widget: "text" }

      - name: "values"
        label: "Values — Four Pillars"
        file: "content/about/content.json"
        fields:
          - { name: "value1Title", label: "Value 1 Title", widget: "string" }
          - { name: "value1Text", label: "Value 1 Text", widget: "text" }
          - { name: "value1Icon", label: "Value 1 Icon", widget: "string", hint: "check, users, leaf, sprout" }
          - { name: "value2Title", label: "Value 2 Title", widget: "string" }
          - { name: "value2Text", label: "Value 2 Text", widget: "text" }
          - { name: "value2Icon", label: "Value 2 Icon", widget: "string", hint: "check, users, leaf, sprout" }
          - { name: "value3Title", label: "Value 3 Title", widget: "string" }
          - { name: "value3Text", label: "Value 3 Text", widget: "text" }
          - { name: "value3Icon", label: "Value 3 Icon", widget: "string", hint: "check, users, leaf, sprout" }
          - { name: "value4Title", label: "Value 4 Title", widget: "string" }
          - { name: "value4Text", label: "Value 4 Text", widget: "text" }
          - { name: "value4Icon", label: "Value 4 Icon", widget: "string", hint: "check, users, leaf, sprout" }

      - name: "human-first"
        label: "Human First — Closing Section"
        file: "content/about/human-first.json"
        fields:
          - { name: "bottomImage", label: "Photo", widget: "image", required: false, hint: "Portrait or square photo. Recommended: 1000×1000px, JPG under 1MB." }
          - { name: "humanFirstEyebrow", label: "Eyebrow Label", widget: "string" }
          - { name: "humanFirstHeading", label: "Heading", widget: "text" }
          - { name: "humanFirstBody1", label: "Body Paragraph 1", widget: "text" }
          - { name: "humanFirstBody2", label: "Body Paragraph 2", widget: "text" }

  - name: "contact"
    label: "📬 Contact / FAQ"
    files:
      - name: "faq1"
        label: "FAQ 1"
        file: "content/contact/faq1.json"
        fields:
          - { name: "question", label: "Question", widget: "string" }
          - { name: "answer", label: "Answer", widget: "text" }
      - name: "faq2"
        label: "FAQ 2"
        file: "content/contact/faq2.json"
        fields:
          - { name: "question", label: "Question", widget: "string" }
          - { name: "answer", label: "Answer", widget: "text" }
      - name: "faq3"
        label: "FAQ 3"
