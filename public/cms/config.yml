backend:
  name: git-gateway
  branch: main

logo_url: /cms/sorted-favicon.png

local_backend:
  url: http://localhost:8081/api/v1
  allowed_hosts: ['localhost', '127.0.0.1']

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: "homepage"
    label: "🏠 Homepage"
    files:
      - name: "hero"
        label: "Hero — Main Banner"
        file: "content/homepage/hero.json"
        fields:
          - { name: "heroImage", label: "Background Photo", widget: "image", required: false, hint: "Landscape photo. Recommended: 1800×1200px or wider, JPG under 1.5MB. Subject should be on the right side." }
          - { name: "tagline", label: "Eyebrow Tagline", widget: "string" }
          - { name: "heading", label: "Main Heading", widget: "text" }
          - { name: "description", label: "Description", widget: "text" }
          - { name: "ctaBookLabel", label: "Primary Button Label", widget: "string" }
          - { name: "ctaBookHref", label: "Primary Button Link", widget: "string" }
          - { name: "ctaWorkLabel", label: "Secondary Button Label", widget: "string" }
          - { name: "locationBadge", label: "Location Badge", widget: "string" }

      - name: "intro"
        label: "About Me — Intro Section"
        file: "content/homepage/intro.json"
        fields:
          - { name: "introImage", label: "Photo", widget: "image", required: false, hint: "Portrait or square photo. Recommended: 900×1100px, JPG under 1MB." }
          - { name: "introEyebrow", label: "Eyebrow Label", widget: "string" }
          - { name: "introHeading", label: "Heading", widget: "text" }
          - { name: "introBody1", label: "Body Paragraph 1", widget: "text" }
          - { name: "introBody2", label: "Body Paragraph 2", widget: "text" }
          - { name: "introSignature", label: "Signature", widget: "string" }

      - name: "featured-work"
        label: "Featured Work — Section Header"
        file: "content/homepage/featured-work.json"
        fields:
          - { name: "workEyebrow", label: "Eyebrow Label", widget: "string" }
          - { name: "workHeading", label: "Heading", widget: "text" }
          - { name: "workSubtext", label: "Subtext", widget: "string" }
          - { name: "workCtaLabel", label: "Button Label", widget: "string" }

      - name: "contact"
        label: "Contact — Enquiry Section"
        file: "content/homepage/contact.json"
        fields:
          - { name: "contactImage", label: "Background Photo", widget: "image", required: false, hint: "Portrait or square photo. Recommended: 900×1100px, JPG under 1MB." }
          - { name: "contactEyebrow", label: "Eyebrow Label", widget: "string" }
          - { name: "contactHeading", label: "Heading", widget: "text" }
          - { name: "contactSubtext", label: "Subtext", widget: "text" }
          - { name: "contactResponseNote", label: "Response Time Note", widget: "string" }

  - name: "services"
    label: "🎬 Services"
    files:
      - name: "social-media-editing"
        label: "Social Media Editing"
        file: "content/services/social-media-editing.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "short", label: "Short Description", widget: "text" }
          - { name: "detail", label: "Full Detail", widget: "text" }
          - { name: "ideal", label: "Best For", widget: "text" }
          - { name: "deliverable1", label: "Deliverable 1", widget: "string" }
          - { name: "deliverable2", label: "Deliverable 2", widget: "string" }
          - { name: "deliverable3", label: "Deliverable 3", widget: "string" }
          - { name: "deliverable4", label: "Deliverable 4", widget: "string" }
      - name: "brand-videography"
        label: "Brand Videography"
        file: "content/services/brand-videography.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "short", label: "Short Description", widget: "text" }
          - { name: "detail", label: "Full Detail", widget: "text" }
          - { name: "ideal", label: "Best For", widget: "text" }
          - { name: "deliverable1", label: "Deliverable 1", widget: "string" }
          - { name: "deliverable2", label: "Deliverable 2", widget: "string" }
          - { name: "deliverable3", label: "Deliverable 3", widget: "string" }
          - { name: "deliverable4", label: "Deliverable 4", widget: "string" }
      - name: "monthly-packages"
        label: "Monthly Packages"
        file: "content/services/monthly-packages.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "short", label: "Short Description", widget: "text" }
          - { name: "detail", label: "Full Detail", widget: "text" }
          - { name: "ideal", label: "Best For", widget: "text" }
          - { name: "deliverable1", label: "Deliverable 1", widget: "string" }
          - { name: "deliverable2", label: "Deliverable 2", widget: "string" }
          - { name: "deliverable3", label: "Deliverable 3", widget: "string" }
          - { name: "deliverable4", label: "Deliverable 4", widget: "string" }
      - name: "creative-direction"
        label: "Creative Direction"
        file: "content/services/creative-direction.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "short", label: "Short Description", widget: "text" }
          - { name: "detail", label: "Full Detail", widget: "text" }
          - { name: "ideal", label: "Best For", widget: "text" }
          - { name: "deliverable1", label: "Deliverable 1", widget: "string" }
          - { name: "deliverable2", label: "Deliverable 2", widget: "string" }
          - { name: "deliverable3", label: "Deliverable 3", widget: "string" }
          - { name: "deliverable4", label: "Deliverable 4", widget: "string" }
      - name: "event-coverage"
        label: "Event Coverage"
        file: "content/services/event-coverage.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "short", label: "Short Description", widget: "text" }
          - { name: "detail", label: "Full Detail", widget: "text" }
          - { name: "ideal", label: "Best For", widget: "text" }
          - { name: "deliverable1", label: "Deliverable 1", widget: "string" }
          - { name: "deliverable2", label: "Deliverable 2", widget: "string" }
          - { name: "deliverable3", label: "Deliverable 3", widget: "string" }
          - { name: "deliverable4", label: "Deliverable 4", widget: "string" }
      - name: "strategy-support"
        label: "Strategy Support"
        file: "content/services/strategy-support.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "short", label: "Short Description", widget: "text" }
          - { name: "detail", label: "Full Detail", widget: "text" }
          - { name: "ideal", label: "Best For", widget: "text" }
          - { name: "deliverable1", label: "Deliverable 1", widget: "string" }
          - { name: "deliverable2", label: "Deliverable 2", widget: "string" }
          - { name: "deliverable3", label: "Deliverable 3", widget: "string" }
          - { name: "deliverable4", label: "Deliverable 4", widget: "string" }

  - name: "work"
    label: "📽 Featured Work"
    description: "Up to 8 work items. Items 1–4 (by order) appear on the homepage. All 8 appear on the Work page. Leave Title blank to hide a slot."
    files:
      - name: "work1"
        label: "Work Item 1"
        file: "content/work/item1.json"
        fields:
          - { name: "order", label: "Display Order", widget: "number", hint: "1 = first. Items 1–4 show on homepage." }
          - { name: "title", label: "Title", widget: "string" }
          - { name: "category", label: "Category", widget: "string" }
          - { name: "video", label: "Video URL", widget: "string", hint: "Paste a direct MP4 or hosted video URL" }
          - { name: "thumbnail", label: "Thumbnail Image", widget: "image", required: false, hint: "Square or portrait crop. Recommended: 560×700px, JPG under 500KB." }
