  - name: "tutorial"
    label: "🎓 Tutorial"
    files:
      - name: "walkthrough"
        label: "Walkthrough Video"
        file: "public/cms/tutorial.json"
        fields:
          - { name: "title", label: "Panel Title", widget: "string", hint: "Short title shown above the video in the CMS panel." }
          - { name: "videoUrl", label: "Video URL", widget: "string", hint: "Paste a YouTube, Vimeo, or direct MP4 URL. Leave blank to hide the panel." }
          - { name: "body", label: "Helper Text", widget: "text", hint: "Short message shown below the video." }

  - name: "site"
    label: "⚙️ Site Settings"
    files:
      - name: "general"
        label: "General"
        file: "content/site/general.json"
        fields:
          - { name: "name", label: "Name", widget: "string" }
          - { name: "studio", label: "Studio Label", widget: "string" }
          - { name: "location", label: "Location", widget: "string" }
          - { name: "phone", label: "Phone", widget: "string" }
          - { name: "email", label: "Email", widget: "string" }
          - { name: "tagline", label: "Tagline", widget: "string" }
          - { name: "description", label: "Meta Description", widget: "text" }
          - { name: "handoffSha", label: "Factory State (Git SHA)", widget: "string", hint: "Do not edit. Records the original build handoff commit. Used by Sorted for factory reset." }
          - { name: "handoffDate", label: "Handoff Date", widget: "string", hint: "Do not edit. Date the site was handed off by Sorted." }

custom_css: "/cms/cms.css"
