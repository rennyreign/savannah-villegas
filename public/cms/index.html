<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savannah Villegas Content Manager</title>
  <link rel="icon" type="image/png" href="/cms/sorted-favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/cms/sorted-favicon.svg" />
  <script>
    if (!["localhost", "127.0.0.1"].includes(window.location.hostname)) {
      document.write('<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"><\/script>');
    }
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="/cms/preview-templates.js"></script>
  <script>
    // Force the Decap preview iframe to be scrollable by removing its fixed height
    function fixPreviewScroll() {
      var iframes = document.querySelectorAll('iframe');
      iframes.forEach(function(iframe) {
        iframe.style.height = '100%';
        iframe.style.minHeight = '100%';
        iframe.style.overflow = 'auto';
        try {
          var doc = iframe.contentDocument || iframe.contentWindow.document;
          if (doc && doc.body) {
            doc.documentElement.style.overflowY = 'auto';
            doc.documentElement.style.height = 'auto';
            doc.body.style.overflowY = 'auto';
            doc.body.style.height = 'auto';
          }
        } catch(e) {}
      });
    }

    // Watch for iframe being added/changed by Decap's React render
    var observer = new MutationObserver(function() {
      fixPreviewScroll();
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Also run on a short interval in case MutationObserver misses style updates
    setInterval(fixPreviewScroll, 1500);
  </script>

  <script>
    /* ── CMS Welcome Panel ── */
    /* Fetches the tutorial video URL from /cms/tutorial.json and injects a
       welcome banner into the CMS nav area once Decap has fully mounted.    */

    var TUTORIAL_JSON = '/cms/tutorial.json';
    var PANEL_ID = 'sv-welcome-panel';

    function injectWelcomePanel(videoUrl, title, body) {
      if (document.getElementById(PANEL_ID)) return;

      var target = document.querySelector('[class*="AppHeaderContent"], [class*="AppHeader"], header, nav');
      if (!target) return;

      var panel = document.createElement('div');
      panel.id = PANEL_ID;
      panel.style.cssText = [
        'position:fixed', 'bottom:24px', 'right:24px', 'z-index:9999',
        'width:340px', 'background:#fff', 'border:1px solid #e5e0da',
        'box-shadow:0 8px 32px rgba(0,0,0,0.12)', 'border-radius:4px',
        'font-family:ui-sans-serif,system-ui,sans-serif', 'overflow:hidden'
      ].join(';');

      var isYoutube = videoUrl && (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be'));
      var embedUrl = '';
      if (isYoutube) {
        var videoId = videoUrl.match(/(?:v=|youtu\.be\/)([^&\s]+)/);
        embedUrl = videoId ? 'https://www.youtube.com/embed/' + videoId[1] : '';
      }
      var isVimeo = videoUrl && videoUrl.includes('vimeo.com');
      if (isVimeo) {
        var vimeoId = videoUrl.match(/vimeo\.com\/(\d+)/);
        embedUrl = vimeoId ? 'https://player.vimeo.com/video/' + vimeoId[1] : '';
      }
      var isSupercut = videoUrl && videoUrl.includes('supercut.ai/share/');
      if (isSupercut) {
        embedUrl = videoUrl.replace('supercut.ai/share/', 'supercut.ai/embed/') + '?embed=full';
      }

      var videoHTML = '';
      if (embedUrl) {
        var isSupercut2 = embedUrl.includes('supercut.ai');
        var paddingBottom = isSupercut2 ? '64.9%' : '56.25%';
        var extraAttrs = isSupercut2 ? ' allow="clipboard-write; encrypted-media; picture-in-picture" mozallowfullscreen webkitallowfullscreen' : '';
        videoHTML = '<div style="position:relative;padding-bottom:' + paddingBottom + ';height:0;overflow:hidden;">'
          + '<iframe src="' + embedUrl + '" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;border-radius:8px;" allowfullscreen' + extraAttrs + '></iframe>'
          + '</div>';
      } else if (videoUrl) {
        videoHTML = '<video src="' + videoUrl + '" controls style="width:100%;display:block;background:#111;"></video>';
      }

      panel.innerHTML = '<div style="background:#191713;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;">'
        + '<span style="font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:#d7c5b2;font-weight:600;">' + (title || 'How to update your site') + '</span>'
        + '<button onclick="document.getElementById(\'' + PANEL_ID + '\').remove()" style="background:none;border:none;color:#d7c5b2;cursor:pointer;font-size:1.1rem;line-height:1;padding:0 2px;">&times;</button>'
        + '</div>'
        + (videoHTML ? videoHTML : '<div style="padding:16px;font-size:0.8rem;color:#6f675d;">Video not set — add a URL in CMS Settings → Tutorial.</div>')
        + '<div style="padding:12px 16px;border-top:1px solid #f0ece6;">'
        + '<p style="font-size:0.75rem;line-height:1.6;color:#6f675d;margin:0;">' + (body || 'Watch the walkthrough above to learn how to update text, images, and more.') + '</p>'
        + '</div>';

      document.body.appendChild(panel);
    }

    function tryInjectPanel() {
      fetch(TUTORIAL_JSON)
        .then(function(r) { return r.ok ? r.json() : {}; })
        .catch(function() { return {}; })
        .then(function(data) {
          injectWelcomePanel(data.videoUrl || '', data.title || '', data.body || '');
        });
    }

    // Wait for Decap to mount before injecting
    var panelObserver = new MutationObserver(function() {
      if (document.querySelector('[class*="App_app"], [class*="AppMainContainer"], main')) {
        panelObserver.disconnect();
        setTimeout(tryInjectPanel, 1200);
      }
    });
    panelObserver.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
